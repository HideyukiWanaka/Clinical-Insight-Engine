version: "3.9"

# ===========================================================
# Clinical Insight Engine — Production Overrides
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# Target: Vercel (frontend) + Railway/Render (backend + r-engine)
# ===========================================================

services:
  frontend:
    build:
      target: prod
    environment:
      - NODE_ENV=production
    restart: always

  backend:
    build:
      target: prod
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --proxy-headers
      --forwarded-allow-ips "*"
    restart: always

  r-engine:
    build:
      context: ./r-engine
      dockerfile: Dockerfile
    restart: always

  postgres:
    image: postgres:15-alpine
    ports: []   # Do NOT expose pg port in production
    restart: always

  redis:
    image: redis:7-alpine
    ports: []   # Do NOT expose redis port in production
    restart: always
