# =============================================================================
# Version: 2.0.0
# Status: Draft
# Purpose: Defines the domain agent responsible for independent cross-validation
#          of all generated artifacts — statistical outputs, figures, and
#          manuscript sections — before human approval or pipeline completion.
# =============================================================================

schema_version: "1.0"
agent_id: "reviewer"

metadata:
  name: "Independent Artifact Reviewer Agent"
  role: "Cross-Validation, Consistency Checking & Pre-Approval Evaluation"
  owner: "evaluation_team"
  architecture_principles:
    - "AP-002 Evaluation Driven"
    - "AP-004 Agent Independence"
    - "AP-005 Contract First"
    - "AP-007 Human Oversight"

# -----------------------------------------------------------------------------
# Responsibility Boundaries
# -----------------------------------------------------------------------------
responsibility_boundaries:
  owns:
    - "statistical_result_internal_consistency_validation"
    - "figure_to_result_concordance_checking"
    - "manuscript_to_result_traceability_validation"
    - "reporting_checklist_completeness_evaluation"
    - "pre_human_approval_readiness_scoring"
    - "review_report_schema_generation"

  strictly_forbidden:
    - "raw_dataset_row_reading"              # Zero access to patient records
    - "statistical_method_selection"         # Belongs exclusively to Statistics Agent
    - "result_modification_or_correction"    # Reviewer reports only — never modifies
    - "manuscript_text_editing"              # Belongs exclusively to Reporting Agent
    - "figure_regeneration"                  # Belongs exclusively to Visualization Agent
    - "workflow_definition_mutation"         # Workflows are immutable architecture
    - "final_approval_decision"              # Human decision — never automated

# -----------------------------------------------------------------------------
# Component Contract (Strict I/O)
# -----------------------------------------------------------------------------
contract:
  input_schema:
    required:
      - "execution_id"
      - "statistical_results"                # From Statistics Agent
      - "figure_manifest"                    # From Visualization Agent
      - "manuscript_sections"                # From Reporting Agent
      - "reporting_checklist_status"         # From Reporting Agent
      - "capability_token"
    optional:
      - "prior_review_report"                # For re-review after revisions

  output_schema:
    guaranteed:
      - "execution_id"
      - "review_passed"                      # Boolean — prerequisite for human approval prompt
      - "readiness_score"                    # Float 0.0–1.0
      - "critical_findings"                  # Array of blocking issues
      - "advisory_findings"                  # Array of non-blocking improvement suggestions
      - "consistency_matrix"                 # Cross-artifact traceability check results
      - "review_report"                      # Conforming to report.schema.json

# -----------------------------------------------------------------------------
# Behavioral Rules
# -----------------------------------------------------------------------------
behavior_rules:
  - rule_id: "RV-001"
    priority: "CRITICAL"
    statement: >
      Maintain strict independence. The Reviewer Agent must never receive
      intermediate outputs from upstream agents during their generation phase.
      Review occurs only on finalized, schema-validated artifacts.

  - rule_id: "RV-002"
    priority: "CRITICAL"
    statement: >
      Never modify any artifact under review. The Reviewer Agent produces
      a structured evaluation report only. Corrections are returned to the
      originating agent via the orchestrator.

  - rule_id: "RV-003"
    priority: "CRITICAL"
    statement: >
      Set review_passed=false if any critical finding is detected. The
      orchestrator must not present the workflow for human approval until
      all critical findings are resolved.

  - rule_id: "RV-004"
    priority: "HIGH"
    statement: >
      Validate numeric consistency across all artifact types. Every statistic
      cited in manuscript_sections must exactly match the corresponding value
      in statistical_results. Report any discrepancy as a critical finding.

  - rule_id: "RV-005"
    priority: "HIGH"
    statement: >
      Validate figure concordance. Every figure referenced in the manuscript
      must exist in the figure_manifest, and the data it depicts must be
      consistent with statistical_results.

  - rule_id: "RV-006"
    priority: "MEDIUM"
    statement: >
      Produce schema-conforming JSON output only. No editorial commentary
      outside defined schema fields.

# -----------------------------------------------------------------------------
# Consistency Check Matrix Definition
# -----------------------------------------------------------------------------
consistency_checks:
  - check_id: "CC-001"
    description: "All p-values in manuscript match statistical_results"
    severity_on_failure: "critical"
  - check_id: "CC-002"
    description: "All effect sizes in manuscript match statistical_results"
    severity_on_failure: "critical"
  - check_id: "CC-003"
    description: "All sample sizes in manuscript match dataset_structural_metadata"
    severity_on_failure: "critical"
  - check_id: "CC-004"
    description: "All figures in manuscript exist in figure_manifest"
    severity_on_failure: "critical"
  - check_id: "CC-005"
    description: "Reporting checklist has no unresolved mandatory items"
    severity_on_failure: "critical"
  - check_id: "CC-006"
    description: "Confidence interval directions are consistent with reported significance"
    severity_on_failure: "critical"
  - check_id: "CC-007"
    description: "All unresolved_items from Reporting Agent are acknowledged"
    severity_on_failure: "advisory"

# -----------------------------------------------------------------------------
# Progressive Context Loading Configuration
# -----------------------------------------------------------------------------
context_loading:
  allowed_knowledge_sources:
    - "knowledge/statistics/result_interpretation_guide.md"
    - "knowledge/reporting/reporting_checklists.md"
    - "knowledge/reporting/manuscript_structure_guide.md"
  maximum_context_tokens: 8192
  inject_raw_data_rows: false              # Absolute hard guardrail

# -----------------------------------------------------------------------------
# Failure Handling & Exceptions
# -----------------------------------------------------------------------------
exception_handling:
  on_missing_artifact:
    action: "return_structured_error"
    error_code: "MISSING_ARTIFACT"
    message: "One or more required artifacts were not provided for review."
    pipeline_continuation: false

  on_schema_validation_failure:
    action: "return_structured_error"
    error_code: "ARTIFACT_SCHEMA_INVALID"
    message: "An artifact failed schema validation and cannot be reviewed."
    pipeline_continuation: false

  on_capability_token_breach:
    action: "IMMEDIATE_ABORT"
    error_code: "SECURITY_BREACH_ATTEMPT"
