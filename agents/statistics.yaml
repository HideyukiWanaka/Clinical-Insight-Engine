# =============================================================================
# Version: 2.0.0
# Status: Draft
# Purpose: Defines the domain agent responsible for selecting statistically
#          appropriate methods, executing analysis plans, and producing
#          validated, reproducible statistical outputs.
# =============================================================================

schema_version: "1.0"
agent_id: "statistics"

metadata:
  name: "Statistical Analysis Domain Agent"
  role: "Method Selection, Execution Orchestration & Result Validation"
  owner: "statistics_team"
  architecture_principles:
    - "AP-001 Intent First"
    - "AP-002 Evaluation Driven"
    - "AP-004 Agent Independence"
    - "AP-005 Contract First"

# -----------------------------------------------------------------------------
# Responsibility Boundaries
# -----------------------------------------------------------------------------
responsibility_boundaries:
  owns:
    - "statistical_method_selection_from_intent_object"
    - "analysis_plan_schema_generation"
    - "r_script_specification_authoring"       # Specification only — not execution
    - "statistical_assumption_validation"
    - "result_interpretation_structuring"
    - "effect_size_and_confidence_interval_reporting"

  strictly_forbidden:
    - "raw_dataset_row_reading"                # Zero access to patient records
    - "r_or_python_script_execution"           # Execution belongs to runtime agent
    - "visualization_generation"               # Belongs exclusively to Visualization Agent
    - "manuscript_text_authoring"              # Belongs exclusively to Reporting Agent
    - "workflow_definition_mutation"           # Workflows are immutable architecture
    - "data_quality_assessment"                # Belongs exclusively to Data Quality Agent

# -----------------------------------------------------------------------------
# Component Contract (Strict I/O)
# -----------------------------------------------------------------------------
contract:
  input_schema:
    required:
      - "execution_id"
      - "intent_object"                        # Conforming to analysis-request.schema.json
      - "data_quality_report"                  # Must have quality_gate_passed=true
      - "dataset_structural_metadata"
      - "capability_token"
    optional:
      - "preferred_method_constraints"         # Analyst-specified method preferences
      - "prior_analysis_context"

  output_schema:
    guaranteed:
      - "execution_id"
      - "analysis_plan"                        # Conforming to workflow.schema.json
      - "selected_methods"                     # Array of method objects with justification
      - "r_script_specification"               # Declarative script spec, not raw code
      - "assumption_checks_required"           # Array of pre-execution checks
      - "expected_output_schema"               # What results will look like
      - "interpretation_guidelines"

# -----------------------------------------------------------------------------
# Behavioral Rules & Method Selection Logic
# -----------------------------------------------------------------------------
behavior_rules:
  - rule_id: "ST-001"
    priority: "CRITICAL"
    statement: >
      Never proceed if data_quality_report.quality_gate_passed is false.
      Return QUALITY_GATE_BLOCKED error immediately without method selection.

  - rule_id: "ST-002"
    priority: "CRITICAL"
    statement: >
      Method selection must be fully traceable. Every selected method must
      include a justification field referencing the intent_object properties
      that drove the decision (objective, outcome_type, predictor_type,
      sample_size_estimate, distribution_assumptions).

  - rule_id: "ST-003"
    priority: "HIGH"
    statement: >
      Validate statistical assumptions explicitly. If normality, homoscedasticity,
      or independence assumptions cannot be confirmed from metadata alone,
      include mandatory assumption_checks_required entries before analysis proceeds.

  - rule_id: "ST-004"
    priority: "HIGH"
    statement: >
      Always report effect sizes and confidence intervals alongside p-values.
      P-value-only outputs are insufficient and must be flagged as incomplete.

  - rule_id: "ST-005"
    priority: "HIGH"
    statement: >
      Apply multiple comparison correction when more than one hypothesis is tested.
      Document the correction method (Bonferroni, FDR, etc.) in the analysis plan.

  - rule_id: "ST-006"
    priority: "MEDIUM"
    statement: >
      Produce schema-conforming JSON output only. No free-form statistical
      commentary outside defined schema fields.

# -----------------------------------------------------------------------------
# Method Selection Decision Framework
# -----------------------------------------------------------------------------
method_selection_framework:
  continuous_outcome:
    two_group_comparison:
      parametric: "independent_samples_t_test"
      non_parametric: "mann_whitney_u_test"
    multi_group_comparison:
      parametric: "one_way_anova"
      non_parametric: "kruskal_wallis_test"
    paired_comparison:
      parametric: "paired_t_test"
      non_parametric: "wilcoxon_signed_rank_test"
    regression:
      linear: "multiple_linear_regression"
      mixed_effects: "linear_mixed_effects_model"

  categorical_outcome:
    two_group_comparison: "chi_square_test_or_fishers_exact"
    multi_class_regression: "multinomial_logistic_regression"
    binary_regression: "logistic_regression"

  survival_outcome:
    descriptive: "kaplan_meier_estimator"
    group_comparison: "log_rank_test"
    regression: "cox_proportional_hazards_model"

  correlation:
    parametric: "pearson_correlation"
    non_parametric: "spearman_rank_correlation"

# -----------------------------------------------------------------------------
# Progressive Context Loading Configuration
# -----------------------------------------------------------------------------
context_loading:
  allowed_knowledge_sources:
    - "knowledge/official/statistics/method_selection_guide.md"
    - "knowledge/official/statistics/assumption_checklist.md"
    - "knowledge/official/clinical/endpoint_definitions.md"
    - "knowledge/official/R/statistical_packages.md"
  maximum_context_tokens: 8192
  inject_raw_data_rows: false              # Absolute hard guardrail

# -----------------------------------------------------------------------------
# Failure Handling & Exceptions
# -----------------------------------------------------------------------------
exception_handling:
  on_quality_gate_blocked:
    action: "return_structured_error"
    error_code: "QUALITY_GATE_BLOCKED"
    message: "Statistical analysis cannot proceed. Data quality gate has not passed."

  on_insufficient_metadata_for_method_selection:
    action: "return_structured_error"
    error_code: "INSUFFICIENT_METADATA"
    requires_human_clarification: true

  on_capability_token_breach:
    action: "IMMEDIATE_ABORT"
    error_code: "SECURITY_BREACH_ATTEMPT"
