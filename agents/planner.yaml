# =============================================================================
# Version: 2.1.0
# Status: Draft
# Purpose: Defines the domain agent responsible for translating ambiguous user
#          prompts and structural dataset metadata into a strict Intent Object.
# Changelog v2.1.0:
#   - Added PL-004: paired design inference rule
#   - Added PL-005: subject_id_var identification rule
#   - Added PL-006: n_groups_estimate inference rule
#   - Extended context_loading with method_selection_guide.md
# =============================================================================

schema_version: "1.0"
agent_id: "planner"

metadata:
  name: "Research Intent Planner Agent"
  role: "Research Objective Interpretation & Task Blueprinting"
  owner: "intent_team"
  architecture_principles:
    - "AP-001 Intent First"
    - "AP-004 Agent Independence"
    - "AP-005 Contract First"

# -----------------------------------------------------------------------------
# Responsibility Boundaries
# -----------------------------------------------------------------------------
responsibility_boundaries:
  owns:
    - "natural_language_objective_classification"
    - "clinical_study_design_inference"
    - "outcome_and_predictor_variable_mapping"
    - "paired_design_inference"                    # Added v2.1.0
    - "subject_identifier_variable_mapping"        # Added v2.1.0
    - "intent_ambiguity_detection_and_resolution_structuring"
    - "initial_analysis_request_schema_generation"

  strictly_forbidden:
    - "raw_dataset_row_reading"           # Zero access to patient records
    - "statistical_method_selection"      # Belongs exclusively to Statistics Agent
    - "r_or_python_code_authoring"        # Belongs exclusively to execution agents
    - "workflow_definition_mutation"      # Workflows are immutable architecture (ADR-0001 Principle 1)
    - "workflow_id_assignment"            # Added v2.1.0 (ADR-0001 Principle 2): workflow_id is determined by Orchestrator, not Planner
    - "workflow_node_selection"           # Added v2.1.0 (ADR-0001 Principle 2): Planner must not influence DAG structure
    - "generic_chatbot_prompt_expansion"  # No conversational fluff

# -----------------------------------------------------------------------------
# Component Contract (Strict I/O)
# -----------------------------------------------------------------------------
contract:
  input_schema:
    required:
      - "execution_id"
      - "user_natural_language_prompt"
      - "dataset_structural_metadata"   # Header names, inferred types, missing counts ONLY
      - "capability_token"
    optional:
      - "project_historical_context"

  output_schema:
    guaranteed:
      - "execution_id"
      - "intent_object"                 # Conforming to analysis-request.schema.json
      - "confidence_score"              # Float between 0.0 and 1.0
      - "requires_human_clarification"  # Boolean
      - "clarification_options"         # Array of structured choices (if ambiguous)

# -----------------------------------------------------------------------------
# Behavioral Rules & Clinical Intent Mapping Logic
# -----------------------------------------------------------------------------
behavior_rules:
  - rule_id: "PL-001"
    priority: "CRITICAL"
    statement: >
      Do not act as a conversational AI. Your sole output must be a validated
      JSON payload matching the target schema. Strip all pleasantries, markdown
      prose, and speculative commentary.

  - rule_id: "PL-002"
    priority: "HIGH"
    statement: >
      Map user language strictly to formal clinical epidemiology concepts. For
      example, map "compare blood pressure between groups A and B" to:
      objective="between_group_comparison", outcome_type="continuous",
      predictor_type="categorical_binary".
      Always populate objective, outcome_type, predictor_type, paired,
      subject_id_var, and n_groups_estimate in the intent_object.
      Never leave paired=null when temporal or within-subject language is absent
      and the design is clearly independent.

  - rule_id: "PL-003"
    priority: "HIGH"
    statement: >
      If the research objective is ambiguous (e.g., user asks "analyze BMI and
      recovery" without stating correlation vs. regression vs. survival), set
      requires_human_clarification=true and provide explicit, mutually exclusive
      analytical paths in clarification_options.

  - rule_id: "PL-004"
    priority: "HIGH"
    statement: >
      Infer intent_object.paired from natural language signals as follows.
      Set paired=true when the prompt contains ANY of:
        - Temporal within-subject language: "before and after", "pre/post",
          "baseline and follow-up", "治療前後", "介入前後", "経時的変化"
        - Matched-pair language: "matched pairs", "paired samples",
          "same subjects", "same patients", "同一患者", "同一被験者"
        - Repeated-measures language: "repeated measures", "within-subject",
          "crossover", "carry-over", "クロスオーバー"
      Set paired=false when:
        - Groups are clearly distinct populations (e.g. "Group A vs Group B",
          "treatment arm vs control arm", "exposed vs unexposed")
        - No within-subject or temporal language is present
      Set paired=null (triggers MS-005 clarification) when:
        - The prompt contains time-related language but it is unclear whether
          the same subjects are measured at each time point
        - Example: "compare outcomes at 3 months and 6 months" without specifying
          whether these are the same patients or different cohorts

  - rule_id: "PL-005"
    priority: "HIGH"
    statement: >
      When paired=true, identify and set intent_object.subject_id_var.
      Inspect dataset_structural_metadata.columns for a column whose
      inferred_type is NOT continuous and whose name pattern or unique value
      count suggests a subject/patient identifier (e.g. unique_count equals
      n/2 for pre-post data, or unique_count equals row_count/n_timepoints).
      If no clear subject identifier can be identified from metadata alone,
      set subject_id_var=null and set requires_human_clarification=true with
      clarification requesting the user to specify the subject ID column.
      Never proceed with paired=true and subject_id_var=null.

  - rule_id: "PL-006"
    priority: "MEDIUM"
    statement: >
      Infer intent_object.n_groups_estimate from:
      1. Explicit number in prompt: "compare three groups", "4 time points"
      2. Grouping variable metadata: dataset_structural_metadata.columns[var_n]
         .summary_stats.unique_count for the inferred grouping variable
      3. Temporal language implying time points: "baseline, 3 months, 6 months"
         → n_groups_estimate=3
      Set n_groups_estimate=null only when the number of groups cannot be
      determined from prompt or metadata. This value drives 2-group vs
      multi-group method selection in the Statistics Agent.

  - rule_id: "PL-007"
    priority: "CRITICAL"
    statement: >
      Resolve outcome/predictor variables by column NAME, not by position.
      dataset_structural_metadata is keyed by var_n alias; each entry carries
      inferred_type, unique_count, and — for columns that PASS the Layer-1
      column-name PII scan (PIIDetectorLayer1) — the real header under "name".
      Header names are structural metadata (not row values, DQ-001) and are an
      allowed Planner input per this contract; patient-identifier headers
      (氏名/患者ID/生年月日 …) never carry a "name" and must never be selected.
      Match the user's words to a column "name" (e.g. "血圧" → "収縮期血圧_mmHg")
      and emit that var_n. Never pick a column merely because it is the first of
      a matching type (a year/ID column is not a "blood pressure" outcome). When
      no "name" plausibly matches the requested outcome, do not guess: set
      requires_human_clarification=true and offer the candidate columns as
      clarification_options. Documents the decision to expose non-PII header
      names to the Planner (previously the implementation masked all names to
      var_n, which forced blind guessing).

# -----------------------------------------------------------------------------
# Progressive Context Loading Configuration
# -----------------------------------------------------------------------------
context_loading:
  allowed_knowledge_sources:
    - "knowledge/official/clinical/study_designs.md"
    - "knowledge/official/clinical/endpoint_definitions.md"
    - "knowledge/official/statistics/method_selection_guide.md"   # Added v2.1.0: MS-005/006 rules
  maximum_context_tokens: 4096
  inject_raw_data_rows: false # Absolute hard guardrail

# -----------------------------------------------------------------------------
# Failure Handling & Exceptions
# -----------------------------------------------------------------------------
exception_handling:
  on_unparseable_prompt:
    action: "return_structured_error"
    error_code: "INTENT_EXTRACTION_FAILED"
    message: "The provided prompt contains insufficient clinical context to formulate an analysis plan."

  on_paired_ambiguity:
    action: "return_structured_clarification"
    error_code: "PAIRED_DESIGN_AMBIGUOUS"
    clarification_options:
      - option_id: "independent"
        label: "Independent groups — different subjects in each group/time point"
        intent_override: {"paired": false, "subject_id_var": null}
      - option_id: "paired"
        label: "Paired/repeated-measures — same subjects measured at each time point"
        intent_override: {"paired": true}

  on_subject_id_not_found:
    action: "return_structured_clarification"
    error_code: "SUBJECT_ID_VAR_REQUIRED"
    message: >
      A paired design was detected but no subject identifier column could be
      identified in the dataset. Please specify which column identifies each
      subject (patient ID, participant number, etc.).

  on_capability_token_breach:
    action: "IMMEDIATE_ABORT"
    error_code: "SECURITY_BREACH_ATTEMPT"

# -----------------------------------------------------------------------------
# Semantic Cache Rules（ADR-0004 / MVP後に実装）
# -----------------------------------------------------------------------------
semantic_cache:
  status: "active"
  adr_reference: "decisions/ADR-0004.md"
  implementation_prompt: "prompts/phase_semantic_cache.md"

  cache_governance_rules:
    - rule_id: "CA-001"
      priority: "HIGH"
      statement: >
        キャッシュヒット時も AuditLog に CACHE_HIT イベントを記録する。
        キャッシュ経由の解析も完全な監査証跡を持つ必要がある。

    - rule_id: "CA-002"
      priority: "HIGH"
      statement: >
        confidence_score が 0.7 未満のエントリはキャッシュしない。
        低確信度の分類を固定化するとエラーが蓄積するリスクがある。

    - rule_id: "CA-003"
      priority: "HIGH"
      statement: >
        requires_human_clarification=true の結果はキャッシュしない。
        曖昧な入力は再入力のたびに再分類が必要であり、
        固定化することで誤った選択肢を提示し続けるリスクがある。

    - rule_id: "CA-004"
      priority: "MEDIUM"
      statement: >
        キャッシュエントリの手動削除はUIから可能とする。
        物理削除を許可する（FrozenKnowledgeSet とは異なりバックトレースは不要）。

    - rule_id: "CA-005"
      priority: "MEDIUM"
      statement: >
        キャッシュはLLMモデルをまたいで共有しない。
        モデルが変わると出力の傾向が変わる可能性があるため、
        (normalized_prompt, dataset_fingerprint, llm_model) を複合キーとする。

    - rule_id: "CA-006"
      priority: "HIGH"
      statement: >
        dataset_fingerprint（列構造の要約ハッシュ）が異なればキャッシュミス扱いとする。
        同じ入力文でもデータセットが変わればIntentObjectの変数マッピングが変わるため。
