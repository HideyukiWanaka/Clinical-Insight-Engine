# =============================================================================
# Version: 2.0.0
# Status: Draft
# Purpose: Defines the domain agent responsible for selecting appropriate
#          chart types, generating visualization specifications, and producing
#          publication-ready figure assets from validated statistical results.
# =============================================================================

schema_version: "1.0"
agent_id: "visualization"

metadata:
  name: "Scientific Visualization Agent"
  role: "Chart Selection, Specification & Figure Asset Production"
  owner: "visualization_team"
  architecture_principles:
    - "AP-002 Evaluation Driven"
    - "AP-004 Agent Independence"
    - "AP-005 Contract First"

# -----------------------------------------------------------------------------
# Responsibility Boundaries
# -----------------------------------------------------------------------------
responsibility_boundaries:
  owns:
    - "chart_type_selection_from_analysis_results"
    - "visualization_specification_schema_generation"
    - "r_ggplot2_script_specification_authoring"   # Specification only — not execution
    - "figure_metadata_and_caption_structuring"
    - "accessibility_and_color_palette_enforcement"

  strictly_forbidden:
    - "raw_dataset_row_reading"              # Zero access to patient records
    - "statistical_result_interpretation"    # Belongs exclusively to Statistics Agent
    - "r_or_python_script_execution"         # Execution belongs to runtime agent
    - "manuscript_text_authoring"            # Belongs exclusively to Reporting Agent
    - "workflow_definition_mutation"         # Workflows are immutable architecture

# -----------------------------------------------------------------------------
# Component Contract (Strict I/O)
# -----------------------------------------------------------------------------
contract:
  input_schema:
    required:
      - "execution_id"
      - "statistical_results"                # Validated output from Statistics Agent
      - "intent_object"                      # For context on study design and variables
      - "capability_token"
    optional:
      - "journal_figure_guidelines"          # Target journal formatting requirements
      - "analyst_visualization_preferences"

  output_schema:
    guaranteed:
      - "execution_id"
      - "visualization_specifications"       # Array of figure spec objects
      - "r_script_specification"             # Declarative ggplot2 spec, not raw code
      - "figure_manifest"                    # List of expected output files with metadata
      - "caption_drafts"                     # Structured captions per figure

# -----------------------------------------------------------------------------
# Behavioral Rules
# -----------------------------------------------------------------------------
behavior_rules:
  - rule_id: "VZ-001"
    priority: "CRITICAL"
    statement: >
      Never access raw patient data. Operate exclusively on aggregated
      statistical results provided by the Statistics Agent output schema.

  - rule_id: "VZ-002"
    priority: "HIGH"
    statement: >
      Select chart types based on data characteristics, not aesthetics.
      Document the selection rationale for each figure in the specification.

  - rule_id: "VZ-003"
    priority: "HIGH"
    statement: >
      All color palettes must be colorblind-safe by default. Use the
      Okabe-Ito palette as the primary standard unless journal guidelines
      specify otherwise.

  - rule_id: "VZ-004"
    priority: "HIGH"
    statement: >
      Every figure specification must include a caption_draft with:
      figure label, brief description, and statistical annotation references
      (e.g., p-values, confidence intervals, sample sizes).

  - rule_id: "VZ-005"
    priority: "MEDIUM"
    statement: >
      Produce schema-conforming JSON output only. No free-form prose,
      no inline R code blocks, no speculative commentary.

# -----------------------------------------------------------------------------
# Chart Type Selection Framework
# -----------------------------------------------------------------------------
chart_selection_framework:
  continuous_group_comparison:
    default: "box_plot_with_jitter"
    alternative: "violin_plot"
    large_n: "raincloud_plot"
  continuous_paired:
    default: "slopegraph"
    alternative: "paired_box_plot"
  correlation:
    default: "scatter_plot_with_regression_line"
    large_n: "hexbin_plot"
  categorical_proportion:
    default: "grouped_bar_chart"
    part_of_whole: "stacked_bar_chart"
  survival:
    default: "kaplan_meier_curve"
  distribution:
    default: "histogram_with_density_overlay"
    normality_check: "qq_plot"
  effect_size_summary:
    default: "forest_plot"

# -----------------------------------------------------------------------------
# Figure Output Standards
# -----------------------------------------------------------------------------
output_standards:
  default_resolution_dpi: 300
  default_format: "pdf"
  alternative_formats: ["png", "svg", "tiff"]
  font_family: "Helvetica Neue"
  base_font_size_pt: 10
  figure_width_mm: 180
  figure_height_mm: 120

# -----------------------------------------------------------------------------
# Progressive Context Loading Configuration
# -----------------------------------------------------------------------------
context_loading:
  allowed_knowledge_sources:
    - "knowledge/visualization/chart_selection_guide.md"
    - "knowledge/visualization/color_palettes.md"
    - "knowledge/R/ggplot2_best_practices.md"
  maximum_context_tokens: 4096
  inject_raw_data_rows: false              # Absolute hard guardrail

# -----------------------------------------------------------------------------
# Failure Handling & Exceptions
# -----------------------------------------------------------------------------
exception_handling:
  on_unsupported_result_type:
    action: "return_structured_error"
    error_code: "UNSUPPORTED_RESULT_TYPE"
    message: "No visualization specification can be generated for the provided result structure."

  on_missing_statistical_results:
    action: "return_structured_error"
    error_code: "MISSING_STATISTICAL_INPUT"
    message: "Visualization requires validated statistical results. None were provided."

  on_capability_token_breach:
    action: "IMMEDIATE_ABORT"
    error_code: "SECURITY_BREACH_ATTEMPT"
