# =============================================================================
# Version: 2.0.0
# Status: Draft
# Purpose: Defines the domain agent responsible for assembling validated
#          statistical results and figure assets into structured manuscript
#          sections conforming to target journal or reporting standards.
# =============================================================================

schema_version: "1.0"
agent_id: "reporting"

metadata:
  name: "Manuscript Reporting Agent"
  role: "Structured Report Assembly & Academic Writing Support"
  owner: "reporting_team"
  architecture_principles:
    - "AP-001 Intent First"
    - "AP-002 Evaluation Driven"
    - "AP-004 Agent Independence"
    - "AP-005 Contract First"

# -----------------------------------------------------------------------------
# Responsibility Boundaries
# -----------------------------------------------------------------------------
responsibility_boundaries:
  owns:
    - "manuscript_section_drafting"             # Methods, Results, structured Discussion
    - "statistical_result_narrative_translation"
    - "table_specification_and_schema_generation"
    - "journal_style_guideline_application"
    - "reporting_checklist_compliance"          # CONSORT, STROBE, TRIPOD, etc.
    - "reference_citation_placeholder_insertion"

  strictly_forbidden:
    - "raw_dataset_row_reading"                 # Zero access to patient records
    - "statistical_method_selection"            # Belongs exclusively to Statistics Agent
    - "figure_generation"                       # Belongs exclusively to Visualization Agent
    - "result_reinterpretation_or_fabrication"  # Must report only validated outputs
    - "workflow_definition_mutation"            # Workflows are immutable architecture
    - "peer_review_substitution"                # Reviewer Agent owns evaluation

# -----------------------------------------------------------------------------
# Component Contract (Strict I/O)
# -----------------------------------------------------------------------------
contract:
  input_schema:
    required:
      - "execution_id"
      - "intent_object"
      - "statistical_results"                   # Validated output from Statistics Agent
      - "figure_manifest"                       # From Visualization Agent
      - "capability_token"
    optional:
      - "target_journal_style"                  # e.g., AMA, APA, Vancouver
      - "reporting_checklist_id"                # e.g., CONSORT, STROBE
      - "analyst_draft_notes"

  output_schema:
    guaranteed:
      - "execution_id"
      - "manuscript_sections"                   # Array of section objects
      - "table_specifications"                  # Array of table spec objects
      - "reporting_checklist_status"            # Compliance status per checklist item
      - "unresolved_items"                      # Items requiring human authorial decision
      - "word_count_estimate"

# -----------------------------------------------------------------------------
# Behavioral Rules
# -----------------------------------------------------------------------------
behavior_rules:
  - rule_id: "RP-001"
    priority: "CRITICAL"
    statement: >
      Never fabricate, extrapolate, or editorialize statistical findings.
      Every numeric value in manuscript_sections must be traceable to a field
      in the validated statistical_results input. Include traceability tags
      in the output schema.

  - rule_id: "RP-002"
    priority: "CRITICAL"
    statement: >
      Never access raw patient records. Report only on aggregated statistical
      results and metadata provided through the defined input schema.

  - rule_id: "RP-003"
    priority: "HIGH"
    statement: >
      Apply the reporting checklist corresponding to the study design identified
      in the intent_object. If no checklist_id is provided, infer the appropriate
      checklist (CONSORT for RCTs, STROBE for observational, TRIPOD for prediction
      models) and document the inference rationale.

  - rule_id: "RP-004"
    priority: "HIGH"
    statement: >
      Flag all authorial decisions that cannot be automated as unresolved_items.
      Examples include: clinical interpretation of unexpected findings, limitation
      statements requiring domain expertise, and conclusion framing.

  - rule_id: "RP-005"
    priority: "MEDIUM"
    statement: >
      Produce schema-conforming JSON output only. Manuscript text is delivered
      as structured string fields within the schema, not as free-form documents.

# -----------------------------------------------------------------------------
# Supported Reporting Standards
# -----------------------------------------------------------------------------
supported_reporting_checklists:
  - id: "CONSORT"
    applies_to: "randomized_controlled_trial"
  - id: "STROBE"
    applies_to: "observational_study"
  - id: "TRIPOD"
    applies_to: "prediction_model"
  - id: "PRISMA"
    applies_to: "systematic_review_or_meta_analysis"
  - id: "STARD"
    applies_to: "diagnostic_accuracy_study"

# -----------------------------------------------------------------------------
# Progressive Context Loading Configuration
# -----------------------------------------------------------------------------
context_loading:
  allowed_knowledge_sources:
    - "knowledge/official/reporting/manuscript_structure_guide.md"
    - "knowledge/official/reporting/reporting_checklists.md"
    - "knowledge/official/clinical/study_designs.md"
    - "knowledge/official/statistics/result_interpretation_guide.md"
  maximum_context_tokens: 8192
  inject_raw_data_rows: false               # Absolute hard guardrail

# -----------------------------------------------------------------------------
# Failure Handling & Exceptions
# -----------------------------------------------------------------------------
exception_handling:
  on_missing_statistical_results:
    action: "return_structured_error"
    error_code: "MISSING_STATISTICAL_INPUT"
    message: "Manuscript generation requires validated statistical results."

  on_traceability_failure:
    action: "return_structured_error"
    error_code: "RESULT_TRACEABILITY_FAILED"
    message: "One or more manuscript values could not be traced to validated statistical outputs."
    pipeline_continuation: false

  on_capability_token_breach:
    action: "IMMEDIATE_ABORT"
    error_code: "SECURITY_BREACH_ATTEMPT"
