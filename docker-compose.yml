version: "3.9"

# ===========================================================
# Clinical Insight Engine — Local Development
# Services: frontend | backend | r-engine | postgres | redis
# ===========================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  cie-internal:          # All services can talk on this network
    driver: bridge
  r-engine-isolated:     # r-engine ONLY — no gateway → no internet
    driver: bridge
    internal: true       # Docker: sets no default gateway → blocks internet

volumes:
  postgres-data:
  redis-data:

services:
  # ──────────────────────────────────────────
  # 1. Frontend — Next.js App Router (port 3000)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: cie-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - BACKEND_INTERNAL_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules          # preserve node_modules from image
      - /app/.next                 # preserve build cache
    networks:
      - cie-internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ──────────────────────────────────────────
  # 2. Backend — FastAPI / Uvicorn (port 8000)
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: cie-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:password@postgres:5432/cie_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SECRET_KEY=${BACKEND_SECRET_KEY:-changeme-in-production}
      - R_ENGINE_URL=http://r-engine:8001
      - ALLOWED_ORIGINS=http://localhost:3000
      - LOG_LEVEL=debug
    volumes:
      - ./backend:/app
    networks:
      - cie-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ──────────────────────────────────────────
  # 3. R Engine — Dockerized R + Plumber (port 8001)
  #    ★ Isolated from the internet via internal network only
  # ──────────────────────────────────────────
  r-engine:
    build:
      context: ./r-engine
      dockerfile: Dockerfile
    container_name: cie-r-engine
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - R_LIBS_USER=/usr/local/lib/R/site-library
      - PLUMBER_HOST=0.0.0.0
      - PLUMBER_PORT=8001
    volumes:
      - ./r-engine:/app
    networks:
      # Connected only to isolated network — no internet route
      - cie-internal       # allows backend → r-engine communication
      - r-engine-isolated  # internal: true → no gateway, no internet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ──────────────────────────────────────────
  # 4. PostgreSQL 15 (port 5432)
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cie-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cie_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - cie-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cie_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ──────────────────────────────────────────
  # 5. Redis 7 — Ephemeral clinical data storage (port 6379)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cie-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis-data:/data
    networks:
      - cie-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
