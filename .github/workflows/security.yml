name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * *'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (all extras) for an accurate dependency graph
        run: pip install -e ".[dev,api,ui,rag,pdf]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan installed dependencies for known CVEs
        run: pip-audit --desc

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scan production dependencies for known vulnerabilities
        run: npm audit --omit=dev
